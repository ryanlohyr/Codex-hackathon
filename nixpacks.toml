[variables]
# Force Railway/Nixpacks to run the app server instead of SPA Caddy mode.
NIXPACKS_SPA_CADDY = "false"
# Ensure Nitro binds publicly inside the container.
NITRO_HOST = "0.0.0.0"

[phases.install]
cmds = ["npm ci --include=dev"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node .output/server/index.mjs"
